<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>King Burger | O Rei do Sabor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Titan+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      17 +   href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"  
    />

    <link rel="icon" type="image/png" href="public/images/talher-navbar-log.png">

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/banner-notice.css" />
    <link rel="stylesheet" href="css/navbar-principal.css" />
    <link rel="stylesheet" href="css/menu-toggle.css" />
    <link rel="stylesheet" href="css/responsivo.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <!-- 1. BANNER DE AVISO -->
    <aside class="notice-banner" role="complementary">
      <p>
        ATENÇÃO! DESCONTOS E CUPONS PROMOCIONAIS SÓ PODEM SER OBTIDOS EM NOSSOS
        CANAIS OFICIAIS.
      </p>
    </aside>

    <!-- 2. NAVBAR PRINCIPAL -->
    <header id="main-header" role="banner">
      <nav class="container navbar" aria-label="Navegação principal">
        <a href="/" class="logo" id="header-logo">
          <img
            class="talher"
            src="public/images/talher-navbar-log.png"
            alt="King Burger Logo"
          />
          <div class="logo-text">
            <span class="king">KING</span>
            <span class="burger">BURGER</span>
          </div>
        </a>

        <button
          class="menu-toggle"
          type="button"     
          data-menu-toggle
          aria-expanded="false"
          aria-label="Abrir menu"
        >
          <span class="material-symbols-outlined icon-menu">menu</span>
          <span class="material-symbols-outlined icon-close">close</span>
        </button>

        <ul class="nav-links" data-menu>
          <li><a href="#menu">MENU</a></li>
          <li><a href="#promocoes">PROMOÇÕES</a></li>
          <li><a href="#kids-menu">KIDS MENU</a></li>
          <li><a href="#app">APP</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content"></main>
  </body>
</html>
